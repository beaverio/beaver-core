name: Auto-assign Issues and Add to Project

on:
  issues:
    types: [opened]

jobs:
  auto-assign-and-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/beaverio/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Auto-assign issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            const defaultAssignee = 'ConnorDBurge';
            const assignee = creator === defaultAssignee ? creator : defaultAssignee;
            
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [assignee]
            });
            
            console.log(`Auto-assigned issue #${issue.number} to ${assignee} and added to project`);
