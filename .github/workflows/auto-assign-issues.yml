name: Add to Project

on:
  issues:
    types: [opened]

jobs:
  auto-assign-and-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to organization project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/beaverio/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          labeled: feature,bug,enhancement,tech-debt,crud
          label-operator: OR
